{% extends 'base.html' %}

{% block content %}
<div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8">
    <h1 class="text-3xl font-bold text-gray-900 mb-8">Carrito de Compras</h1>
    
    <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
        <!-- Cart Items -->
        <div class="lg:col-span-2">
            <div id="cart-items" class="space-y-4">
                <!-- Cart items will be loaded here by JavaScript -->
            </div>
            
            <div id="empty-cart" class="text-center py-12 hidden">
                <i class="fas fa-shopping-cart text-gray-400 text-6xl mb-4"></i>
                <h3 class="text-xl font-semibold text-gray-600 mb-2">Tu carrito está vacío</h3>
                <p class="text-gray-500 mb-6">Agrega algunos productos para comenzar</p>
                <a href="{% url 'tienda:home' %}" 
                   class="bg-primary text-white px-6 py-3 rounded-lg hover:bg-secondary transition-colors">
                    Continuar Comprando
                </a>
            </div>
        </div>

        <!-- Order Summary -->
        <div class="lg:col-span-1">
            <div class="bg-gray-50 rounded-lg p-6 sticky top-24">
                <h3 class="text-lg font-semibold mb-4">Resumen del Pedido</h3>
                
                <div class="space-y-3 mb-6">
                    <div class="flex justify-between">
                        <span class="text-gray-600">Subtotal:</span>
                        <span id="subtotal">$0.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Envío:</span>
                        <span id="shipping">$5.00</span>
                    </div>
                    <div class="flex justify-between">
                        <span class="text-gray-600">Impuestos:</span>
                        <span id="taxes">$0.00</span>
                    </div>
                    <div class="border-t border-gray-300 pt-3">
                        <div class="flex justify-between font-semibold text-lg">
                            <span>Total:</span>
                            <span id="total">$0.00</span>
                        </div>
                    </div>
                </div>

                <button id="checkout-btn" 
                        class="w-full bg-primary text-white py-3 px-6 rounded-lg font-semibold hover:bg-secondary transition-colors disabled:bg-gray-300 disabled:cursor-not-allowed"
                        disabled>
                    Proceder al Pago
                </button>

                <div class="mt-4 text-center space-y-2">
                    <a href="{% url 'tienda:home' %}" class="block text-primary hover:underline">
                        <i class="fas fa-arrow-left mr-1"></i>Continuar Comprando
                    </a>
                    <button onclick="clearCart()" class="text-red-500 hover:underline text-sm">
                        <i class="fas fa-trash mr-1"></i>Limpiar Carrito
                    </button>
                </div>
            </div>
        </div>
    </div>
</div>

<script>
// Función para obtener información del producto desde la API
async function getProductInfo(productId) {
    try {
        const response = await fetch(`/api/productos/${productId}/`);
        if (response.ok) {
            return await response.json();
        }
    } catch (error) {
        console.error('Error obteniendo información del producto:', error);
    }
    return null;
}

async function loadCart() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const cartItemsContainer = document.getElementById('cart-items');
    const emptyCartDiv = document.getElementById('empty-cart');
    
    if (cart.length === 0) {
        cartItemsContainer.innerHTML = '';
        emptyCartDiv.classList.remove('hidden');
        document.getElementById('checkout-btn').disabled = true;
        updateSummary();
        return;
    }
    
    emptyCartDiv.classList.add('hidden');
    document.getElementById('checkout-btn').disabled = false;
    
    // Obtener información actualizada de productos (imagen y stock)
    const updatedCart = [];
    for (let item of cart) {
        const productInfo = await getProductInfo(item.id);
        if (productInfo) {
            // Actualizar imagen si está disponible
            if (productInfo.imagen) {
                item.image = productInfo.imagen;
            }
            // Guardar stock para validación
            item.stock = productInfo.stock || 0;
            // Validar que la cantidad no exceda el stock disponible
            if (item.quantity > item.stock) {
                item.quantity = item.stock;
                showNotification(`Stock limitado: ${item.name}. Cantidad ajustada a ${item.stock}`, 'warning');
            }
            // Si no hay stock, eliminar del carrito
            if (item.stock === 0) {
                showNotification(`${item.name} está agotado y fue eliminado del carrito`, 'error');
                continue;
            }
        }
        updatedCart.push(item);
    }
    
    // Actualizar localStorage con la información actualizada
    localStorage.setItem('cart', JSON.stringify(updatedCart));
    
    if (updatedCart.length === 0) {
        loadCart();
        return;
    }
    
    cartItemsContainer.innerHTML = updatedCart.map(item => `
        <div class="bg-white rounded-lg shadow-md p-6 flex items-center space-x-4">
            <div class="w-20 h-20 bg-gray-200 rounded-lg overflow-hidden">
                ${item.image ? 
                    `<img src="${item.image}" alt="${item.name}" class="w-full h-full object-cover">` : 
                    `<div class="w-full h-full flex items-center justify-center"><i class="fas fa-image text-gray-400"></i></div>`
                }
            </div>
            <div class="flex-1">
                <h3 class="font-semibold text-lg">${item.name}</h3>
                <p class="text-gray-600">$${item.price}</p>
                ${item.stock !== undefined ? `<p class="text-xs text-gray-500 mt-1">Stock: ${item.stock}</p>` : ''}
            </div>
            <div class="flex items-center space-x-3">
                <button onclick="updateQuantity(${item.id}, ${item.quantity - 1})" 
                        class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300 transition-colors"
                        ${item.quantity <= 1 ? 'disabled' : ''}>
                    <i class="fas fa-minus text-sm"></i>
                </button>
                <span class="w-8 text-center font-semibold">${item.quantity}</span>
                <button onclick="updateQuantity(${item.id}, ${item.quantity + 1})" 
                        class="w-8 h-8 rounded-full bg-gray-200 flex items-center justify-center hover:bg-gray-300 transition-colors"
                        ${item.stock !== undefined && item.quantity >= item.stock ? 'disabled' : ''}>
                    <i class="fas fa-plus text-sm"></i>
                </button>
            </div>
            <div class="text-right">
                <p class="font-semibold text-lg">$${(item.price * item.quantity).toFixed(2)}</p>
                <button onclick="removeFromCart(${item.id})" 
                        class="text-red-500 hover:text-red-700 transition-colors mt-1">
                    <i class="fas fa-trash"></i>
                </button>
            </div>
        </div>
    `).join('');
    
    updateSummary();
}

async function updateQuantity(productId, newQuantity) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    
    if (newQuantity <= 0) {
        removeFromCart(productId);
        return;
    }
    
    const itemIndex = cart.findIndex(item => item.id === productId);
    if (itemIndex !== -1) {
        // Verificar stock disponible antes de actualizar
        const productInfo = await getProductInfo(productId);
        if (productInfo) {
            const stockDisponible = productInfo.stock || 0;
            if (newQuantity > stockDisponible) {
                showNotification(`Stock insuficiente. Solo hay ${stockDisponible} unidades disponibles`, 'error');
                newQuantity = stockDisponible;
                if (newQuantity === 0) {
                    removeFromCart(productId);
                    return;
                }
            }
            cart[itemIndex].stock = stockDisponible;
        }
        cart[itemIndex].quantity = newQuantity;
        localStorage.setItem('cart', JSON.stringify(cart));
        loadCart();
        updateCartCount();
    }
}

function removeFromCart(productId) {
    let cart = JSON.parse(localStorage.getItem('cart')) || [];
    cart = cart.filter(item => item.id !== productId);
    localStorage.setItem('cart', JSON.stringify(cart));
    loadCart();
    updateCartCount();
    showNotification('Producto eliminado del carrito');
}

function showNotification(message, type = 'success') {
    const colors = {
        success: 'bg-green-500',
        error: 'bg-red-500',
        warning: 'bg-yellow-500',
        info: 'bg-blue-500'
    };
    const color = colors[type] || colors.success;
    
    const notification = document.createElement('div');
    notification.className = `fixed top-20 right-4 ${color} text-white px-6 py-3 rounded-lg shadow-lg z-50 transform translate-x-full transition-transform`;
    notification.textContent = message;
    document.body.appendChild(notification);
    
    setTimeout(() => {
        notification.classList.remove('translate-x-full');
    }, 100);
    
    setTimeout(() => {
        notification.classList.add('translate-x-full');
        setTimeout(() => {
            if (document.body.contains(notification)) {
                document.body.removeChild(notification);
            }
        }, 300);
    }, 3000);
}

function updateSummary() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    const subtotal = cart.reduce((sum, item) => sum + (item.price * item.quantity), 0);
    const shipping = cart.length > 0 ? 5.00 : 0;
    const taxes = subtotal * 0.1; // 10% tax
    const total = subtotal + shipping + taxes;
    
    document.getElementById('subtotal').textContent = `$${subtotal.toFixed(2)}`;
    document.getElementById('shipping').textContent = `$${shipping.toFixed(2)}`;
    document.getElementById('taxes').textContent = `$${taxes.toFixed(2)}`;
    document.getElementById('total').textContent = `$${total.toFixed(2)}`;
}

function clearCart() {
    localStorage.removeItem('cart');
    loadCart();
    updateCartCount();
    showNotification('Carrito vaciado');
}

// Load cart when page loads
document.addEventListener('DOMContentLoaded', function() {
    loadCart();
});

// Checkout functionality
document.getElementById('checkout-btn').addEventListener('click', async function() {
    const cart = JSON.parse(localStorage.getItem('cart')) || [];
    if (cart.length === 0) return;
    
    const btn = this;
    const originalText = btn.textContent;
    btn.disabled = true;
    btn.textContent = 'Procesando...';
    showNotification('Procesando pedido...', 'info');
    
    try {
        // Preparar items para enviar al servidor
        const items = cart.map(item => ({
            id: item.id,
            quantity: item.quantity,
            price: item.price
        }));
        
        const response = await fetch('/api/carrito/procesar-pago/', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json',
                'X-CSRFToken': getCookie('csrftoken')
            },
            body: JSON.stringify({ items: items })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            showNotification('¡Pedido realizado con éxito! Compra #' + data.id, 'success');
            
            // Mostrar detalles de la compra
            let detallesTexto = `Compra #${data.id}\nFecha: ${new Date(data.fecha).toLocaleString()}\n\n`;
            detallesTexto += `Detalles:\n`;
            data.detalles.forEach(detalle => {
                detallesTexto += `- ${detalle.producto_nombre}: ${detalle.cantidad} x $${detalle.precio_unitario} = $${detalle.subtotal}\n`;
            });
            detallesTexto += `\nSubtotal: $${data.subtotal}\n`;
            detallesTexto += `Envío: $${data.envio}\n`;
            detallesTexto += `Impuestos: $${data.impuestos}\n`;
            detallesTexto += `Total: $${data.total}`;
            
            alert(detallesTexto);
            
            // Limpiar carrito
            clearCart();
            
            // Redirigir al inicio después de 2 segundos
            setTimeout(() => {
                window.location.href = '/';
            }, 2000);
        } else {
            showNotification(data.error || 'Error al procesar el pago', 'error');
            btn.disabled = false;
            btn.textContent = originalText;
        }
    } catch (error) {
        console.error('Error:', error);
        showNotification('Error al procesar el pago. Por favor intenta de nuevo.', 'error');
        btn.disabled = false;
        btn.textContent = originalText;
    }
});

// Función auxiliar para obtener el token CSRF
function getCookie(name) {
    let cookieValue = null;
    if (document.cookie && document.cookie !== '') {
        const cookies = document.cookie.split(';');
        for (let i = 0; i < cookies.length; i++) {
            const cookie = cookies[i].trim();
            if (cookie.substring(0, name.length + 1) === (name + '=')) {
                cookieValue = decodeURIComponent(cookie.substring(name.length + 1));
                break;
            }
        }
    }
    return cookieValue;
}
</script>
{% endblock %}
